name: Backpacks
version: 1.0.0
main: com.backpacks.plugin.BackpacksPlugin
api-version: 26.2
permissions:
  backpacks.give:
    description: Give backpacks
    default: op
  backpacks.reload:
    description: Reload plugin configs
    default: op
commands:
  backpack:
    description: Backpack management
    usage: /<command> give <player> <tier> | /<command> reload
    aliases: [bp]
    permission: backpacks.give
    subcommands:
      give:
        description: Give a backpack
        usage: /<command> give <player> <tier>
      reload:
        description: Reload configs
        usage: /<command> reload
